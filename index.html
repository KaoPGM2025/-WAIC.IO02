<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Saver - ยุค Google AI</title>
    <!-- Tailwind CSS for layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js for Statistics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .sidebar {
            transition: transform 0.3s ease-in-out;
            z-index: 1001;
        }

        .sidebar.closed {
            transform: translateX(-100%);
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 1000;
        }

        .sidebar-overlay.active {
            display: block;
        }

        .progress-bar-fill {
            transition: width 1s ease-in-out;
        }

        .status-online { background: #10b981; }
        .status-offline { background: #ef4444; }

        .btn-action {
            transition: all 0.2s;
        }
        .btn-action:active { transform: scale(0.95); }

        /* ปรับขนาด Chart ให้พอดี */
        #chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        @keyframes pulse-ai {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }
        .ai-glow { animation: pulse-ai 2s infinite; }
    </style>
</head>
<body class="antialiased">

    <!-- Sidebar Overlay -->
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar Menu -->
    <aside id="sidebar" class="sidebar fixed left-0 top-0 w-64 h-full bg-white shadow-2xl p-6 closed">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-bold text-blue-600 flex items-center gap-2">
                <i class="fas fa-brain"></i> AI Menu
            </h2>
            <button onclick="toggleSidebar()" class="text-gray-400 hover:text-red-500"><i class="fas fa-times"></i></button>
        </div>
        
        <nav class="space-y-1">
            <button onclick="showPage('home')" class="w-full flex items-center p-3 rounded-xl hover:bg-blue-50 text-gray-700 font-medium transition-colors">
                <i class="fas fa-home w-8 text-blue-500"></i> หน้าหลัก
            </button>
            <button onclick="showPage('stats')" class="w-full flex items-center p-3 rounded-xl hover:bg-green-50 text-gray-700 font-medium transition-colors">
                <i class="fas fa-chart-bar w-8 text-green-500"></i> หน้าสถิติ
            </button>
            <button onclick="showPage('goal')" class="w-full flex items-center p-3 rounded-xl hover:bg-red-50 text-gray-700 font-medium transition-colors">
                <i class="fas fa-bullseye w-8 text-red-500"></i> หน้าเป้าหมาย
            </button>
            <button onclick="showPage('history')" class="w-full flex items-center p-3 rounded-xl hover:bg-purple-50 text-gray-700 font-medium transition-colors">
                <i class="fas fa-list w-8 text-purple-500"></i> หน้ารายการ
            </button>
        </nav>

        <div class="absolute bottom-8 left-6 right-6">
            <button onclick="requestReset()" id="reset-btn" class="w-full py-3 rounded-xl text-sm font-bold border border-red-200 text-red-500 hover:bg-red-500 hover:text-white transition-all">
                <i class="fas fa-trash-alt mr-2"></i> ลบข้อมูลทั้งหมด
            </button>
        </div>
    </aside>

    <!-- Header -->
    <header class="p-4 flex justify-between items-center max-w-5xl mx-auto w-full">
        <button onclick="toggleSidebar()" class="bg-white p-3 rounded-xl shadow-sm hover:shadow-md transition">
            <i class="fas fa-bars text-gray-600"></i>
        </button>
        
        <div class="flex items-center gap-4">
            <div class="text-right">
                <p id="display-date" class="text-[10px] text-gray-400 font-bold uppercase"></p>
                <p id="display-time" class="text-sm font-bold text-blue-600"></p>
            </div>
            <div class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-full shadow-sm border border-gray-100">
                <div id="online-indicator" class="w-2 h-2 rounded-full status-online"></div>
                <span id="status-label" class="text-[10px] font-bold text-gray-600">ONLINE</span>
                <button onclick="toggleStatus()" class="ml-1 text-[9px] bg-gray-100 px-2 py-0.5 rounded-md hover:bg-gray-200 font-bold">สลับ</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 max-w-4xl mx-auto w-full p-4">
        
        <!-- Logo Section -->
        <div class="text-center mb-8">
            <div class="inline-block bg-white p-4 rounded-3xl shadow-lg mb-3">
                <!-- SVG Piggy Bank -->
                <svg width="48" height="48" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M416 256C416 344.366 344.366 416 256 416C167.634 416 96 344.366 96 256C96 167.634 167.634 96 256 96C344.366 96 416 167.634 416 256Z" fill="#FFC0CB"/>
                    <path d="M256 128C185.308 128 128 185.308 128 256C128 326.692 185.308 384 256 384C326.692 384 384 326.692 384 256C384 185.308 326.692 128 256 128Z" fill="#FFB6C1"/>
                    <circle cx="210" cy="230" r="10" fill="#333"/>
                    <circle cx="302" cy="230" r="10" fill="#333"/>
                    <path d="M230 300C240 315 272 315 282 300" stroke="#333" stroke-width="5" stroke-linecap="round"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Smart Saver AI</h1>
            <p class="text-xs text-gray-500 font-medium uppercase tracking-widest">Powered by Google Evolution</p>
        </div>

        <!-- Page: Home -->
        <div id="page-home" class="page-view space-y-4">
            <div class="grid md:grid-cols-2 gap-4">
                <!-- Input Card -->
                <div class="glass-card p-6">
                    <h3 class="text-sm font-bold text-gray-400 mb-4 uppercase">บันทึกการออม</h3>
                    <div class="space-y-4">
                        <div class="relative">
                            <input type="number" id="savings-input" placeholder="0.00" class="w-full bg-gray-50 p-4 rounded-xl text-xl font-bold focus:ring-2 focus:ring-blue-400 outline-none transition-all">
                            <span class="absolute right-4 top-1/2 -translate-y-1/2 font-bold text-gray-300">THB</span>
                        </div>
                        <button onclick="addSavings()" id="btn-save" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold shadow-lg shadow-blue-100 btn-action">
                            บันทึกข้อมูล
                        </button>
                    </div>
                </div>

                <!-- Progress Card -->
                <div class="glass-card p-6 flex flex-col justify-center">
                    <div class="flex justify-between items-end mb-2">
                        <div>
                            <p class="text-[10px] text-gray-400 font-bold uppercase">ความคืบหน้า</p>
                            <h2 id="percent-display" class="text-4xl font-black text-blue-600">0%</h2>
                        </div>
                        <div class="text-right">
                            <p id="total-saved-display" class="text-xl font-bold text-gray-800">฿ 0</p>
                            <p class="text-[10px] text-gray-400">เป้าหมาย: ฿<span id="goal-val-display">0</span></p>
                        </div>
                    </div>
                    <div class="w-full bg-gray-100 h-3 rounded-full overflow-hidden">
                        <div id="progress-bar" class="progress-bar-fill h-full bg-blue-500 w-0"></div>
                    </div>
                    <div id="ai-status" class="hidden mt-3 text-center">
                        <span class="text-[10px] font-bold text-blue-500 ai-glow">
                            <i class="fas fa-microchip mr-1"></i> AI กำลังประมวลผลเป้าหมายใหม่ (10s)...
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Page: Stats -->
        <div id="page-stats" class="page-view hidden">
            <div class="glass-card p-6">
                <h3 class="text-sm font-bold text-gray-400 mb-6 uppercase">สถิติการออมล่าสุด</h3>
                <div id="chart-container">
                    <canvas id="savingsChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Page: Goal -->
        <div id="page-goal" class="page-view hidden">
            <div class="glass-card p-6 max-w-sm mx-auto">
                <h3 class="text-sm font-bold text-gray-400 mb-4 uppercase">ตั้งค่าเป้าหมายแมนนวล</h3>
                <input type="number" id="goal-input" class="w-full bg-gray-50 p-4 rounded-xl text-lg font-bold mb-4 outline-none border border-gray-100" placeholder="ระบุเป้าหมาย">
                <button onclick="setManualGoal()" class="w-full bg-gray-800 text-white p-4 rounded-xl font-bold btn-action">อัปเดตเป้าหมาย</button>
            </div>
        </div>

        <!-- Page: History -->
        <div id="page-history" class="page-view hidden">
            <div class="glass-card p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-sm font-bold text-gray-400 uppercase">รายการล่าสุด (Auto-clean 1m)</h3>
                    <i class="fas fa-bolt text-yellow-400 text-xs"></i>
                </div>
                <div id="history-list" class="space-y-2">
                    <!-- Dynamic Content -->
                    <p class="text-center text-gray-300 py-10 italic text-sm">ไม่มีรายการใหม่</p>
                </div>
            </div>
        </div>

    </main>

    <!-- UI Notification -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full text-xs font-bold opacity-0 transition-opacity pointer-events-none z-[2000]">
        ข้อความแจ้งเตือน
    </div>

    <script>
        // --- State Management ---
        const DB_KEY = "SMART_SAVER_STORAGE_V1";
        let state = {
            online: true,
            total: 0,
            goal: 1000,
            history: [], // Permanent history for chart
            recent: [],  // Volatile history (1 minute)
            resetTimer: null
        };

        let chart = null;

        // --- Initialization ---
        window.onload = () => {
            loadData();
            updateClock();
            setInterval(updateClock, 1000);
            initChart();
            render();
            
            // Background Monitors
            setInterval(checkRecentCleanup, 1000);
        };

        function loadData() {
            const saved = localStorage.getItem(DB_KEY);
            if (saved) {
                const parsed = JSON.parse(saved);
                state.total = parsed.total || 0;
                state.goal = parsed.goal || 1000;
                state.history = parsed.history || [];
                // 'recent' is intentionally not loaded from storage (Rule #6)
            }
        }

        function saveData() {
            localStorage.setItem(DB_KEY, JSON.stringify({
                total: state.total,
                goal: state.goal,
                history: state.history
            }));
        }

        // --- Logic Functions ---

        function addSavings() {
            if (!state.online) return showToast("ระบบออฟไลน์อยู่ ไม่สามารถบันทึกได้");

            const input = document.getElementById('savings-input');
            const amount = parseFloat(input.value);

            if (isNaN(amount) || amount <= 0) return showToast("กรุณาระบุจำนวนเงินที่ถูกต้อง");

            const now = Date.now();
            const timeStr = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });

            const entry = { amount, time: timeStr, timestamp: now };

            state.total += amount;
            state.history.push(entry);
            state.recent.push(entry); // Added to volatile list

            input.value = "";
            saveData();
            render();
            updateChart();
            showToast("บันทึกเงินออมเรียบร้อย +฿" + amount);

            checkAIAutoUpdate();
        }

        function checkAIAutoUpdate() {
            if (state.total >= state.goal) {
                document.getElementById('ai-status').classList.remove('hidden');
                showToast("ครบเป้าหมาย! AI กำลังคำนวณเป้าหมายถัดไป...");

                setTimeout(() => {
                    // Logic: Increment goal by 50% automatically
                    state.goal = Math.ceil((state.goal * 1.5) / 100) * 100;
                    document.getElementById('ai-status').classList.add('hidden');
                    saveData();
                    render();
                    showToast("AI ปรับเป้าหมายใหม่เป็น ฿" + state.goal);
                }, 10000); // 10 seconds delay as requested
            }
        }

        function checkRecentCleanup() {
            const now = Date.now();
            const beforeLength = state.recent.length;
            // Rule #6: Delete items older than 1 minute
            state.recent = state.recent.filter(item => (now - item.timestamp) < 60000);
            
            if (beforeLength !== state.recent.length) {
                renderHistory();
            }
        }

        function requestReset() {
            if (state.resetTimer) return showToast("กำลังอยู่ในการนับถอยหลังลบข้อมูล...");
            
            if (confirm("ต้องการลบข้อมูลทั้งหมดถาวรหรือไม่? (จะลบภายใน 1 นาที)")) {
                const btn = document.getElementById('reset-btn');
                btn.classList.add('bg-red-500', 'text-white');
                btn.innerHTML = "กำลังลบข้อมูล (60s)";
                
                state.resetTimer = setTimeout(() => {
                    localStorage.removeItem(DB_KEY);
                    state.total = 0;
                    state.goal = 1000;
                    state.history = [];
                    state.recent = [];
                    state.resetTimer = null;
                    
                    btn.classList.remove('bg-red-500', 'text-white');
                    btn.innerHTML = '<i class="fas fa-trash-alt mr-2"></i> ลบข้อมูลทั้งหมด';
                    
                    saveData();
                    render();
                    updateChart();
                    showToast("ลบข้อมูลสำเร็จ");
                }, 60000); // 1 minute delay
            }
        }

        // --- UI Rendering ---

        function render() {
            // Numbers
            document.getElementById('total-saved-display').innerText = "฿ " + state.total.toLocaleString();
            document.getElementById('goal-val-display').innerText = state.goal.toLocaleString();
            document.getElementById('percent-display').innerText = Math.floor(Math.min((state.total / state.goal) * 100, 100)) + "%";
            
            // Progress Bar
            const p = Math.min((state.total / state.goal) * 100, 100);
            document.getElementById('progress-bar').style.width = p + "%";

            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            if (state.recent.length === 0) {
                list.innerHTML = `<p class="text-center text-gray-300 py-10 italic text-sm">ไม่มีรายการใหม่ใน 1 นาทีนี้</p>`;
                return;
            }

            list.innerHTML = state.recent.slice().reverse().map(item => `
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center text-blue-500 text-xs">
                            <i class="fas fa-arrow-up"></i>
                        </div>
                        <span class="font-bold text-gray-700">฿${item.amount.toLocaleString()}</span>
                    </div>
                    <span class="text-[9px] font-bold text-gray-400">${item.time}</span>
                </div>
            `).join('');
        }

        function toggleSidebar() {
            const side = document.getElementById('sidebar');
            const over = document.getElementById('sidebar-overlay');
            side.classList.toggle('closed');
            over.classList.toggle('active');
        }

        function showPage(id) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + id).classList.remove('hidden');
            toggleSidebar();
        }

        function toggleStatus() {
            state.online = !state.online;
            const ind = document.getElementById('online-indicator');
            const lbl = document.getElementById('status-label');
            const btn = document.getElementById('btn-save');
            const inp = document.getElementById('savings-input');

            if (state.online) {
                ind.className = "w-2 h-2 rounded-full status-online";
                lbl.innerText = "ONLINE";
                btn.disabled = false;
                btn.style.opacity = "1";
                inp.disabled = false;
                showToast("ระบบออนไลน์: บันทึกได้ปกติ");
            } else {
                ind.className = "w-2 h-2 rounded-full status-offline";
                lbl.innerText = "OFFLINE";
                btn.disabled = true;
                btn.style.opacity = "0.4";
                inp.disabled = true;
                showToast("ระบบออฟไลน์: บันทึกไม่ได้");
            }
        }

        function setManualGoal() {
            const val = parseFloat(document.getElementById('goal-input').value);
            if (val > 0) {
                state.goal = val;
                saveData();
                render();
                showPage('home');
                showToast("ปรับเป้าหมายสำเร็จ");
            }
        }

        // --- Helpers ---

        function initChart() {
            const ctx = document.getElementById('savingsChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'เงินออม (฿)',
                        data: [],
                        backgroundColor: '#3b82f6',
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { display: false } },
                        x: { grid: { display: false } }
                    }
                }
            });
            updateChart();
        }

        function updateChart() {
            if (!chart) return;
            const lastData = state.history.slice(-7); // Last 7 entries
            chart.data.labels = lastData.map(d => d.time);
            chart.data.datasets[0].data = lastData.map(d => d.amount);
            chart.update();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('display-date').innerText = now.toLocaleDateString('th-TH', { weekday: 'short', day: 'numeric', month: 'short' });
            document.getElementById('display-time').innerText = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.opacity = "1";
            setTimeout(() => t.style.opacity = "0", 3000);
        }

    </script>
</body>
</html>
